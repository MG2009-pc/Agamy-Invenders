<!DOCTYPE html>
<html lang="ar">
<head>
     <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Agamy Invenders</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* 💾 تحميل البيانات */
let level = parseInt(localStorage.getItem("level")) || 1;
let score = parseInt(localStorage.getItem("score")) || 0;

/* اللاعب */
let player = {
  x: canvas.width/2,
  y: canvas.height-150,
  w: 70,
  h: 70
};

let bullets=[], enemies=[], powerUps=[], particles=[];
let health = 100;
let shooting = false;
let weapon = "normal";

/* نجوم */
let stars=[];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2});
}

/* تحكم */
canvas.addEventListener("touchstart",()=> shooting=true);
canvas.addEventListener("touchend",()=> shooting=false);

canvas.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  player.x=t.clientX-player.w/2;
  player.y=t.clientY-player.h/2;
});

/* إطلاق */
function shoot(){
  if(weapon==="normal"){
    bullets.push({x:player.x+30,y:player.y,w:8,h:18,speed:10});
  }
  else if(weapon==="fast"){
    bullets.push({x:player.x+30,y:player.y,w:6,h:14,speed:15});
  }
  else if(weapon==="double"){
    bullets.push({x:player.x+10,y:player.y,w:8,h:18,speed:10});
    bullets.push({x:player.x+50,y:player.y,w:8,h:18,speed:10});
  }
}

/* أعداء */
function spawnEnemy(){
  enemies.push({
    x:Math.random()*(canvas.width-60),
    y:-60,
    w:60,
    h:60,
    speed:2+level*0.5,
    hp:1
  });
}

/* Boss */
let boss=null;

function spawnBoss(){
  boss={
    x:canvas.width/2-100,
    y:50,
    w:200,
    h:200,
    hp:20+level*10,
    color:`hsl(${level*60},100%,50%)`
  };
}

/* PowerUps */
function spawnPowerUp(){
  powerUps.push({
    x:Math.random()*canvas.width,
    y:-30,
    w:20,
    h:20,
    type:["normal","fast","double"][Math.floor(Math.random()*3)]
  });
}

/* تحديث */
function update(){

  if(shooting && Math.random()<0.3) shoot();

  bullets.forEach((b,i)=>{
    b.y-=b.speed;
    if(b.y<0) bullets.splice(i,1);
  });

  enemies.forEach((e,ei)=>{
    e.y+=e.speed;

    if(
      e.x<player.x+player.w &&
      e.x+e.w>player.x &&
      e.y<player.y+player.h &&
      e.y+e.h>player.y
    ){
      health-=10;
      enemies.splice(ei,1);
    }

    if(e.y>canvas.height) enemies.splice(ei,1);
  });

  /* ضرب الأعداء */
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(
        b.x<e.x+e.w &&
        b.x+b.w>e.x &&
        b.y<e.y+e.h &&
        b.y+b.h>e.y
      ){
        score+=10;
        enemies.splice(ei,1);
        bullets.splice(bi,1);
      }
    });
  });

  /* Boss */
  if(boss){
    bullets.forEach((b,bi)=>{
      if(
        b.x<boss.x+boss.w &&
        b.x+b.w>boss.x &&
        b.y<boss.y+boss.h &&
        b.y+b.h>boss.y
      ){
        boss.hp--;
        bullets.splice(bi,1);
      }
    });

    if(boss.hp<=0){
      boss=null;
      level++;
      localStorage.setItem("level",level);
    }
  }

  /* PowerUps */
  powerUps.forEach((p,pi)=>{
    p.y+=3;

    if(
      p.x<player.x+player.w &&
      p.x+p.w>player.x &&
      p.y<player.y+player.h &&
      p.y+p.h>player.y
    ){
      weapon=p.type;
      powerUps.splice(pi,1);
    }
  });

  /* حفظ */
  localStorage.setItem("score",score);

  if(health<=0){
    alert("Game Over 💀 Score: "+score);
    localStorage.clear();
    location.reload();
  }
}

/* رسم */
function draw(){

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* نجوم */
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,s.s,s.s);
    s.y+=0.5;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  });

  /* اللاعب */
  ctx.fillStyle="lime";
  ctx.beginPath();
  ctx.moveTo(player.x+35,player.y);
  ctx.lineTo(player.x,player.y+70);
  ctx.lineTo(player.x+70,player.y+70);
  ctx.fill();

  /* bullets */
  ctx.fillStyle="yellow";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  /* enemies */
  ctx.fillStyle="red";
  enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));

  /* boss */
  if(boss){
    ctx.fillStyle=boss.color;
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

    ctx.fillStyle="white";
    ctx.fillText("Boss HP: "+boss.hp,20,90);
  }

  /* powerUps */
  ctx.fillStyle="yellow";
  powerUps.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  /* HUD */
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Score: "+score,10,25);
  ctx.fillText("Health: "+health,10,50);
  ctx.fillText("Level: "+level,10,75);
}

/* loop */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* spawn */
setInterval(()=>{
  if(!boss){
    spawnEnemy();
    if(Math.random()<0.2) spawnPowerUp();
  }
},800);

/* كل 20 ثانية Boss */
setInterval(()=>{
  if(!boss) spawnBoss();
},20000);

loop();

</script>

</body>
</html>
