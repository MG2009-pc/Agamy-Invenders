<!DOCTYPE html>
<html lang="ar">
<head>
    <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Agamy Invenders</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* حفظ */
let level = parseInt(localStorage.getItem("level")) || 1;
let score = parseInt(localStorage.getItem("score")) || 0;

/* اللاعب */
let player = {
  x: canvas.width/2,
  y: canvas.height-180,
  w: 90,
  h: 90
};

let bullets=[], enemies=[], particles=[], powerUps=[];
let boss=null;

let health = 100;
let shooting = false;
let weapon="normal";

/* نجوم */
let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    s:Math.random()*2
  });
}

/* تحكم */
canvas.addEventListener("touchstart",()=> shooting=true);
canvas.addEventListener("touchend",()=> shooting=false);
canvas.addEventListener("touchmove",e=>{
  let t=e.touches[0];
  player.x=t.clientX-player.w/2;
  player.y=t.clientY-player.h/2;
});

/* إطلاق */
function shoot(){
  if(weapon==="double"){
    bullets.push({x:player.x+20,y:player.y,w:10,h:25,speed:12});
    bullets.push({x:player.x+60,y:player.y,w:10,h:25,speed:12});
  }else{
    bullets.push({
      x:player.x+40,
      y:player.y,
      w:10,
      h:25,
      speed: weapon==="fast"?16:12
    });
  }
}

/* أعداء */
function spawnEnemy(){
  enemies.push({
    x:Math.random()*(canvas.width-80),
    y:-80,
    w:80,
    h:80,
    speed:2 + level*0.6,
    color:`hsl(${level*40},80%,50%)`
  });
}

/* Boss */
function spawnBoss(){
  boss={
    x:canvas.width/2-150,
    y:50,
    w:300,
    h:300,
    hp:40+level*10,
    color:`hsl(${level*70},100%,50%)`
  };
}

/* PowerUps */
function spawnPowerUp(){
  powerUps.push({
    x:Math.random()*canvas.width,
    y:-30,
    w:25,
    h:25,
    type:["normal","fast","double"][Math.floor(Math.random()*3)]
  });
}

/* تحديث */
function update(){

  if(shooting && Math.random()<0.3) shoot();

  bullets.forEach((b,i)=>{
    b.y-=b.speed;
    if(b.y<0) bullets.splice(i,1);
  });

  enemies.forEach((e,ei)=>{
    e.y+=e.speed;

    if(
      e.x<player.x+player.w &&
      e.x+e.w>player.x &&
      e.y<player.y+player.h &&
      e.y+e.h>player.y
    ){
      health-=10;
      enemies.splice(ei,1);
    }

    if(e.y>canvas.height) enemies.splice(ei,1);
  });

  /* ضرب + انفجار */
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(
        b.x<e.x+e.w &&
        b.x+b.w>e.x &&
        b.y<e.y+e.h &&
        b.y+b.h>e.y
      ){
        score+=10;

        /* انفجار AAA */
        for(let i=0;i<20;i++){
          particles.push({
            x:e.x+40,
            y:e.y+40,
            vx:(Math.random()-0.5)*8,
            vy:(Math.random()-0.5)*8,
            life:30,
            color:e.color
          });
        }

        enemies.splice(ei,1);
        bullets.splice(bi,1);
      }
    });
  });

  /* Boss */
  if(boss){
    bullets.forEach((b,bi)=>{
      if(
        b.x<boss.x+boss.w &&
        b.x+b.w>boss.x &&
        b.y<boss.y+boss.h &&
        b.y+b.h>boss.y
      ){
        boss.hp--;
        bullets.splice(bi,1);
      }
    });

    if(boss.hp<=0){
      boss=null;
      level++;
      alert("🔥 Agamy Hunter 🔥");
      localStorage.setItem("level",level);
    }
  }

  /* PowerUps */
  powerUps.forEach((p,pi)=>{
    p.y+=3;

    if(
      p.x<player.x+player.w &&
      p.x+p.w>player.x &&
      p.y<player.y+player.h &&
      p.y+p.h>player.y
    ){
      weapon=p.type;
      powerUps.splice(pi,1);
    }
  });

  /* particles */
  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  });

  /* صعوبة */
  if(level%2===0){
    enemies.forEach(e=> e.speed+=0.03);
  }

  /* حفظ */
  localStorage.setItem("score",score);

  if(health<=0){
    alert("Game Over 💀 Score: "+score);
    localStorage.clear();
    location.reload();
  }
}

/* رسم */
function draw(){

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* الفضاء */
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,s.s,s.s);
    s.y+=0.5;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  });

  /* اللاعب */
  ctx.fillStyle="lime";
  ctx.beginPath();
  ctx.moveTo(player.x+45,player.y);
  ctx.lineTo(player.x,player.y+90);
  ctx.lineTo(player.x+90,player.y+90);
  ctx.fill();

  /* bullets */
  ctx.fillStyle= weapon==="fast"?"cyan": weapon==="double"?"orange":"yellow";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  /* enemies */
  enemies.forEach(e=>{
    ctx.fillStyle=e.color;
    ctx.fillRect(e.x,e.y,e.w,e.h);
  });

  /* boss */
  if(boss){
    ctx.fillStyle=boss.color;
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

    ctx.fillStyle="white";
    ctx.fillText("Boss HP: "+boss.hp,20,100);
  }

  /* انفجار */
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,4,4);
  });

  /* HUD */
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Score: "+score,10,25);
  ctx.fillText("Health: "+health,10,50);
  ctx.fillText("Level: "+level,10,75);
}

/* loop */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* spawn */
setInterval(()=>{
  if(!boss){
    spawnEnemy();
    if(Math.random()<0.2) spawnPowerUp();
  }
},700);

setInterval(()=>{
  if(!boss) spawnBoss();
},20000);

loop();

</script>

</body>
</html>
