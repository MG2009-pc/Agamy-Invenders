<!DOCTYPE html>
<html lang="ar">
<head>
   <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Agamy Invinders</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* شاشة بالطول */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* اللاعب */
let player = {
  x: canvas.width / 2,
  y: canvas.height - 120,
  w: 50,
  h: 50
};

let bullets = [];
let enemies = [];
let particles = [];
let powerUps = [];
let stars = [];

let score = 0;
let health = 100;

let shooting = false;

/* نجوم */
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: Math.random() * 2
  });
}

/* سحب + إطلاق */
canvas.addEventListener("touchstart", e => {
  shooting = true;
});

canvas.addEventListener("touchend", e => {
  shooting = false;
});

canvas.addEventListener("touchmove", e => {
  let t = e.touches[0];
  player.x = t.clientX - player.w/2;
  player.y = t.clientY - player.h/2;
});

/* إطلاق مستمر */
function shoot() {
  bullets.push({
    x: player.x + 22,
    y: player.y,
    w: 6,
    h: 12,
    speed: 10
  });
}

/* أعداء */
function spawnEnemy() {
  enemies.push({
    x: Math.random() * (canvas.width - 40),
    y: -50,
    w: 40,
    h: 40,
    speed: 2 + Math.random() * 2
  });
}

/* PowerUp */
function spawnPowerUp() {
  powerUps.push({
    x: Math.random() * canvas.width,
    y: -30,
    w: 25,
    h: 25,
    speed: 2
  });
}

/* تحديث */
function update() {

  if (shooting && Math.random() < 0.3) shoot();

  /* bullets */
  bullets.forEach((b,i)=>{
    b.y -= b.speed;
    if (b.y < 0) bullets.splice(i,1);
  });

  /* enemies */
  enemies.forEach((e, ei)=>{
    e.y += e.speed;

    if (
      e.x < player.x + player.w &&
      e.x + e.w > player.x &&
      e.y < player.y + player.h &&
      e.y + e.h > player.y
    ){
      health -= 10;
      enemies.splice(ei,1);
    }

    if (e.y > canvas.height) enemies.splice(ei,1);
  });

  /* bullets vs enemies */
  bullets.forEach((b, bi)=>{
    enemies.forEach((e, ei)=>{
      if (
        b.x < e.x + e.w &&
        b.x + b.w > e.x &&
        b.y < e.y + e.h &&
        b.y + b.h > e.y
      ){
        score += 10;

        for(let i=0;i<10;i++){
          particles.push({
            x:e.x, y:e.y,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            life:20
          });
        }

        enemies.splice(ei,1);
        bullets.splice(bi,1);
      }
    });
  });

  /* powerUp */
  powerUps.forEach((p, pi)=>{
    p.y += p.speed;

    if (
      p.x < player.x + player.w &&
      p.x + p.w > player.x &&
      p.y < player.y + player.h &&
      p.y + p.h > player.y
    ){
      health = Math.min(100, health + 20);
      powerUps.splice(pi,1);
    }
  });

  /* particles */
  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if(p.life <= 0) particles.splice(i,1);
  });

  if (health <= 0) {
    alert("Game Over 💀 Score: " + score);
    location.reload();
  }
}

/* رسم */
function draw() {

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* نجوم */
  ctx.fillStyle = "white";
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,s.s,s.s);
    s.y += 0.5;
    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  });

  /* اللاعب (طيارة) */
  ctx.fillStyle = "lime";
  ctx.beginPath();
  ctx.moveTo(player.x + 25, player.y);
  ctx.lineTo(player.x, player.y + 50);
  ctx.lineTo(player.x + 50, player.y + 50);
  ctx.fill();

  /* bullets */
  ctx.fillStyle = "yellow";
  bullets.forEach(b=>{
    ctx.fillRect(b.x,b.y,b.w,b.h);
  });

  /* enemies */
  ctx.fillStyle = "red";
  enemies.forEach(e=>{
    ctx.fillRect(e.x,e.y,e.w,e.h);
  });

  /* powerUps */
  ctx.fillStyle = "cyan";
  powerUps.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  /* particles */
  ctx.fillStyle = "orange";
  particles.forEach(p=>{
    ctx.fillRect(p.x,p.y,3,3);
  });

  /* HUD */
  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 25);
  ctx.fillText("Health: " + health, 10, 50);
}

/* لوب */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

setInterval(spawnEnemy, 800);
setInterval(spawnPowerUp, 5000);

loop();

</script>

</body>
</html>
